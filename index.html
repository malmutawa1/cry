<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#33507C">
<title>Pressd</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F4F3; --surface:#FFFFFF; --surface-2:#EAEDEB;
    --ink:#1C2430; --muted:#667080; --line:#DCE2DF;
    --indigo:#33507C; --indigo-dark:#24395C; --indigo-tint:#E7EBF2;
    --amber:#C98A3E; --amber-tint:#F6E9D6;
    --teal:#3F8478; --teal-tint:#E1EEEB; --teal-dark:#2F6B5E;
    --violet:#7C7A9E; --violet-tint:#EBEAF2;
    --brick:#A6493B; --brick-tint:#F3E3E0;
    --grey:#8A8F92; --grey-tint:#EDEFEE;
    --r-sm:8px; --r-md:14px; --r-lg:22px;
    --shadow-1:0 1px 2px rgba(28,36,48,.06), 0 1px 1px rgba(28,36,48,.04);
    --shadow-2:0 10px 28px rgba(28,36,48,.10);
    --sans:'IBM Plex Sans',-apple-system,BlinkMacSystemFont,sans-serif;
    --serif:'IBM Plex Serif',Georgia,serif;
    --mono:'IBM Plex Mono','SF Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);}
  body{-webkit-font-smoothing:antialiased;}
  #root{max-width:900px;margin:0 auto;padding:0 16px 64px;min-height:100vh;}
  a{color:inherit;}
  button{font-family:var(--sans);cursor:pointer;}
  input,select,textarea{font-family:var(--sans);font-size:15px;}
  ::selection{background:var(--indigo-tint);}

  /* ---- Header ---- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px;flex-wrap:wrap;gap:12px;}
  .wordmark{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:-0.01em;color:var(--indigo-dark);}
  .wordmark small{display:block;font-family:var(--sans);font-weight:500;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
  .view-toggle{display:inline-flex;background:var(--surface-2);border-radius:999px;padding:3px;gap:2px;}
  .toggle-btn{border:none;background:transparent;padding:8px 16px;border-radius:999px;font-size:13.5px;font-weight:600;color:var(--muted);transition:background .15s, color .15s;}
  .toggle-btn.active{background:var(--surface);color:var(--indigo-dark);box-shadow:var(--shadow-1);}

  /* ---- Layout helpers ---- */
  .stack{display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media (max-width:640px){.grid-2{grid-template-columns:1fr;}}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-1);}
  .card h2{margin:0 0 4px;font-family:var(--serif);font-weight:600;font-size:18px;}
  .card .sub{color:var(--muted);font-size:13.5px;margin:0 0 16px;}
  .eyebrow{font-size:11.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 6px;}

  /* ---- Buttons ---- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;border:1px solid transparent;transition:transform .1s, box-shadow .15s, background .15s;white-space:nowrap;}
  .btn:active{transform:scale(.97);}
  .btn:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:2px solid var(--indigo);outline-offset:2px;}
  .btn-primary{background:var(--indigo);color:#fff;}
  .btn-primary:hover{background:var(--indigo-dark);}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--ink);}
  .btn-ghost:hover{background:var(--surface-2);}
  .btn-danger{background:transparent;border-color:var(--brick-tint);color:var(--brick);}
  .btn-danger:hover{background:var(--brick-tint);}
  .btn-sm{padding:7px 13px;font-size:12.5px;}
  .btn-block{width:100%;}
  .btn[disabled]{opacity:.5;cursor:not-allowed;}
  .link-btn{background:none;border:none;padding:0;color:var(--indigo);font-weight:600;font-size:13px;text-decoration:underline;text-underline-offset:2px;}

  /* ---- Forms ---- */
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field{margin-bottom:14px;}
  input[type=text],input[type=tel],input[type=number],input[type=date],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);color:var(--ink);
  }
  textarea{resize:vertical;min-height:64px;}
  .field-row{display:flex;gap:10px;flex-wrap:wrap;}
  .field-row > .field{flex:1;min-width:140px;}
  .error-text{color:var(--brick);font-size:12.5px;margin-top:6px;}
  .hint{color:var(--muted);font-size:12.5px;margin-top:6px;}

  /* ---- Pills / badges ---- */
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:600;line-height:1.5;}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;}

  /* ---- Drum gauge ---- */
  .gauge-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
  .drum-gauge{animation:gauge-in .5s ease-out both;}
  @keyframes gauge-in{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
  .gauge-value{font-family:var(--mono);font-weight:600;}
  .gauge-cap{font-family:var(--mono);fill:var(--muted);}

  /* ---- KPI strip ---- */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;}
  .kpi .num{font-family:var(--serif);font-weight:600;font-size:26px;color:var(--indigo-dark);line-height:1.15;}
  .kpi .label{font-size:12px;color:var(--muted);margin-top:4px;}

  /* ---- Tier mix bar ---- */
  .mixbar{height:14px;border-radius:999px;overflow:hidden;display:flex;background:var(--surface-2);}
  .mix-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:12.5px;color:var(--muted);}
  .mix-legend .sw{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:6px;}

  /* ---- List rows (subscribers / pickups) ---- */
  .item-row{border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px;background:var(--surface);display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .item-row + .item-row{margin-top:10px;}
  .item-main{flex:1;min-width:180px;}
  .item-name{font-weight:600;font-size:14.5px;}
  .item-meta{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .item-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .mini-gauge-row{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12.5px;color:var(--muted);}

  .empty{border:1px dashed var(--line);border-radius:var(--r-md);padding:26px 20px;text-align:center;color:var(--muted);font-size:13.5px;}
  .empty strong{display:block;color:var(--ink);font-size:14.5px;margin-bottom:4px;}

  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--line);}
  .tab-btn{background:none;border:none;padding:10px 4px;margin-right:18px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;}
  .tab-btn.active{color:var(--indigo-dark);border-bottom-color:var(--indigo);}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .chip{border:1px solid var(--line);background:var(--surface);padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--muted);}
  .chip.active{background:var(--indigo-tint);border-color:var(--indigo-tint);color:var(--indigo-dark);}

  .tier-card{border:1.5px solid var(--line);border-radius:var(--r-md);padding:16px;cursor:pointer;transition:border-color .15s, background .15s;background:var(--surface);}
  .tier-card:hover{border-color:var(--indigo);}
  .tier-card .price{font-family:var(--serif);font-weight:600;font-size:22px;margin:4px 0 2px;}
  .tier-card .cap{font-family:var(--mono);font-size:12.5px;color:var(--muted);}

  /* ---- Item catalog (pay per item) ---- */
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .item-card{border:1px solid var(--line);border-radius:var(--r-md);background:var(--surface);padding:14px;display:flex;flex-direction:column;gap:8px;}
  .item-card .icon-badge{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
  .item-card .iname{font-weight:600;font-size:13.5px;line-height:1.3;}
  .item-card .iprice{font-family:var(--mono);font-size:12px;color:var(--muted);}
  .add-btn{width:30px;height:30px;border-radius:50%;background:var(--indigo);color:#fff;border:none;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .add-btn:hover{background:var(--indigo-dark);}
  .service-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid var(--line);border-radius:999px;padding:8px 8px 8px 14px;background:var(--surface-2);flex-wrap:wrap;}
  .service-row .slabel{font-size:13px;font-weight:500;}
  .service-row .sprice{font-family:var(--mono);font-size:12.5px;color:var(--muted);}
  .qty-stepper{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:999px;padding:3px 5px;}
  .qty-stepper button{width:25px;height:25px;border-radius:50%;border:1px solid var(--line);background:var(--surface);font-size:14px;line-height:1;}
  .qty-stepper button[disabled]{opacity:.4;cursor:not-allowed;}
  .qty-stepper span{min-width:14px;text-align:center;font-family:var(--mono);font-weight:600;font-size:13px;}
  .addon-row{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;}
  .basket-bar{position:sticky;bottom:14px;background:var(--indigo-dark);color:#fff;border-radius:999px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px;box-shadow:var(--shadow-2);flex-wrap:wrap;}
  .basket-bar button{background:#fff;color:var(--indigo-dark);}

  footer.note{text-align:center;color:var(--muted);font-size:11.5px;margin-top:36px;line-height:1.6;}

  #toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--indigo-dark);color:#fff;padding:12px 20px;border-radius:999px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow-2);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:50;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){
    .drum-gauge, #toast{animation:none !important;transition:none !important;}
  }
</style>
</head>

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      parsed.ui = {};
      if(!parsed.view) parsed.view = 'customer';
      if(!parsed.customer) parsed.customer = {subscriberId:null};
      if(!parsed.admin) parsed.admin = {staffName:'', screen:'dashboard'};
      if(!parsed.routeFilter) parsed.routeFilter = 'today';
      if(!parsed.itemOrders) parsed.itemOrders = [];
      if(!parsed.orderFilter) parsed.orderFilter = 'today';
      state = parsed;
      return;
    }
  }catch(e){ /* key doesn't exist yet, or storage unavailable */ }
  state = seedData();
  await saveState();
}

async function saveState(){
  const toSave = {
    subscribers: state.subscribers, pickups: state.pickups, view: state.view,
    customer: state.customer, admin: state.admin, routeFilter: state.routeFilter
  };
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(toSave), true);
    storageOK = true;
  }catch(e){
    storageOK = false;
  }
}

/* ================= HELPERS ================= */
function findSub(id){ return state.subscribers.find(s=>s.id===id); }
function findPickup(id){ return state.pickups.find(p=>p.id===id); }
function subPickups(id){
  return state.pickups.filter(p=>p.subscriberId===id).sort((a,b)=> (b.date+b.window).localeCompare(a.date+a.window));
}
function activeSubs(){ return state.subscribers.filter(s=>s.status!=='cancelled'); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove('show'), 2600);
}

function drumGauge(used, cap, opts){
  opts = opts || {};
  const size = opts.size || 116;
  const stroke = opts.stroke || (size < 60 ? 6 : 10);
  const showText = opts.showText !== false;
  const over = used > cap;
  const color = over ? '#A6493B' : (opts.color || '#C98A3E');
  const pct = cap > 0 ? Math.min(used/cap, 1) : 0;
  const r = (size - stroke)/2;
  const c = 2*Math.PI*r;
  const dash = c*pct;
  const mid = size/2;
  let inner = '';
  if(showText){
    inner = `<text x="50%" y="47%" text-anchor="middle" class="gauge-value" font-size="${size*0.19}" fill="var(--ink)">${used}</text>
      <text x="50%" y="66%" text-anchor="middle" class="gauge-cap" font-size="${size*0.10}">/ ${cap} kg</text>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" class="drum-gauge" role="img" aria-label="${used} of ${cap} kilograms used this cycle">
    <circle cx="${mid}" cy="${mid}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${stroke}"/>
    <circle cx="${mid}" cy="${mid}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round"
      stroke-dasharray="${dash} ${c}" transform="rotate(-90 ${mid} ${mid})"/>
    ${inner}
  </svg>`;
}

function pill(label, color, tint){
  return `<span class="pill" style="color:${color};background:${tint}"><span class="dot"></span>${esc(label)}</span>`;
}
function tierPill(tierKey){
  const t = TIERS[tierKey];
  return pill(t.name, t.color, t.color+'22');
}
function subStatusPill(status){
  const s = SUB_STATUS[status];
  return pill(s.label, s.color, s.tint);
}
function pickupStatusPill(status){
  const s = PICKUP_STATUS[status];
  return pill(s.label, s.color, s.tint);
}

function renderAdminRoute(){

  list.sort((a,b)=> (a.date+a.window).localeCompare(b.date+b.window));

  const filterChips = filters.map(([key,label]) => `<button class="chip ${filter===key?'active':''}" onclick="App.setRouteFilter('${key}')">${label}</button>`).join('');

  let rows;
  if(list.length===0){
    rows = `<div class="empty"><strong>No pickups here</strong>Nothing matches this filter right now.</div>`;
  } else {
    rows = list.map(p => {
      const sub = findSub(p.subscriberId);

      } else if(st.action){
        actionArea = `<button class="btn btn-ghost btn-sm" onclick="App.advanceStatus('${p.id}')">${st.action}</button>`;

        actionArea = '';
      }
      const confirmingCancel = state.ui.confirmingCancelPickupId === p.id;
      return `<div class="item-row">
        <div class="item-main">
          <div class="item-name">${sub?esc(sub.name):'Unknown'} &middot; ${esc(p.window)}</div>
          <div class="item-meta">${sub?esc(sub.area):''} &middot; ${fmtDate(p.date)} &middot; ${p.bags} bag${p.bags==1?'':'s'}${p.weightKg?` &middot; ${p.weightKg} kg`:''}</div>

function renderSubscriberRows(search){
  let list = state.subscribers.slice().sort((a,b)=>a.name.localeCompare(b.name));
  if(search){
    list = list.filter(s => s.name.toLowerCase().includes(search) || s.phone.toLowerCase().includes(search));
  }
  if(list.length===0){
    return `<div class="empty"><strong>No subscribers match</strong>Try a different search, or add a new subscriber above.</div>`;
  }
  return list.map(s => {
    const tier = TIERS[s.tier];
    const confirmingCancel = state.ui.confirmingCancelSubId === s.id;
    return `<div class="item-row">
      <div class="item-main">
        <div class="item-name">${esc(s.name)}</div>
        <div class="item-meta">${esc(s.area)} &middot; ${esc(s.phone)} &middot; joined ${fmtDate(s.joinDate)}</div>
        <div class="mini-gauge-row" style="margin-top:6px;">${drumGauge(s.usedKg, tier.cap, {size:34, stroke:5, showText:false, color:tier.color})} ${s.usedKg}/${tier.cap} kg</div>
      </div>
      <div class="item-actions">
        ${tierPill(s.tier)}
        ${subStatusPill(s.status)}
        ${s.status!=='cancelled' ? `
          <select onchange="App.changeTierAdmin('${s.id}', this.value)" style="width:auto;padding:6px 8px;font-size:12.5px;">
            ${Object.values(TIERS).map(t=>`<option value="${t.key}" ${t.key===s.tier?'selected':''}>${t.name}</option>`).join('')}
          </select>
          ${s.status==='active'
            ? `<button class="btn btn-ghost btn-sm" onclick="App.pause('${s.id}')">Pause</button>`
            : `<button class="btn btn-ghost btn-sm" onclick="App.resume('${s.id}')">Resume</button>`}
          <button class="btn btn-ghost btn-sm" onclick="App.resetCycle('${s.id}')">Reset cycle</button>
          ${confirmingCancel
            ? `<span style="font-size:12.5px;color:var(--brick);">Sure? <button class="link-btn" style="color:var(--brick);" onclick="App.cancelSub('${s.id}')">Yes</button> &middot; <button class="link-btn" onclick="App.dismissConfirm()">No</button></span>`
            : `<button class="btn btn-danger btn-sm" onclick="App.askCancelSub('${s.id}')">Cancel</button>`}
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ================= ACTIONS ================= */
const App = {
  async setView(v){ state.view=v; state.ui={}; await saveState(); render(); },
  async setAdminScreen(s){ state.admin.screen=s; state.ui={}; await saveState(); render(); },
  async setRouteFilter(f){ state.routeFilter=f; render(); },

  dismissConfirm(){ state.ui.confirmingCancelSubId=null; state.ui.confirmingCancelPickupId=null; state.ui.collectingPickupId=null; render(); },

  /* --- customer login / signup --- */
  customerLogin(){
    const val = document.getElementById('login-phone').value.trim();
    const errEl = document.getElementById('login-error');
    if(!val){ errEl.style.display='block'; errEl.textContent='Enter the phone number you signed up with.'; return; }
    const norm = val.replace(/[\s-]/g,'');
    const found = state.subscribers.find(s => s.phone.replace(/[\s-]/g,'') === norm);
    if(!found){ errEl.style.display='block'; errEl.textContent="We couldn't find an account with that number."; return; }
    state.customer.subscriberId = found.id;
    saveState(); render();
  },
  pickSignupTier(key){ state.ui.signupTier = key; render(); },
  completeSignup(){
    const name = document.getElementById('su-name').value.trim();
    const phone = document.getElementById('su-phone').value.trim();
    const area = document.getElementById('su-area').value;
    const errEl = document.getElementById('su-error');
    if(!name || !phone){ errEl.style.display='block'; errEl.textContent='Name and phone are both required.'; return; }
    const id = uid('s');
    state.subscribers.push({id, name, phone, area, tier: state.ui.signupTier, status:'active', joinDate: todayISO(0), cycleStart: todayISO(0), usedKg:0});
    state.customer.subscriberId = id;
    state.ui = {};
    saveState(); render();
    showToast('Welcome to FreshCycle!');
  },
  customerLogout(){ state.customer.subscriberId=null; state.ui={}; saveState(); render(); },
  restart(id, tierKey){
    const s = findSub(id);
    s.status='active'; s.tier=tierKey; s.cycleStart=todayISO(0); s.usedKg=0;
    saveState(); render(); showToast('Subscription restarted');
  },

  /* --- plan management (shared by customer + admin) --- */
  toggleChangePlan(){ state.ui.showChangePlan = !state.ui.showChangePlan; render(); },
  changeTier(id, tierKey){
    const s = findSub(id); s.tier = tierKey; state.ui.showChangePlan=false;
    saveState(); render(); showToast('Plan updated to '+TIERS[tierKey].name);
  },
  changeTierAdmin(id, tierKey){ this.changeTier(id, tierKey); },
  pause(id){ findSub(id).status='paused'; saveState(); render(); showToast('Subscription paused'); },
  resume(id){ findSub(id).status='active'; saveState(); render(); showToast('Subscription resumed'); },
  askCancelSub(id){ state.ui.confirmingCancelSubId=id; render(); },
  cancelSub(id){ findSub(id).status='cancelled'; state.ui.confirmingCancelSubId=null; saveState(); render(); showToast('Subscription cancelled'); },
  resetCycle(id){ const s=findSub(id); s.usedKg=0; s.cycleStart=todayISO(0); saveState(); render(); showToast('Cycle reset'); },

  /* --- booking (customer) --- */
  bookPickup(subscriberId){
    const date = document.getElementById('pk-date').value;
    const win = document.getElementById('pk-window').value;
    const bags = parseInt(document.getElementById('pk-bags').value,10);
    const notes = document.getElementById('pk-notes').value.trim();
    const errEl = document.getElementById('pk-error');
    if(!date || date < todayISO(0)){ errEl.style.display='block'; errEl.textContent='Choose today or a future date.'; return; }
    if(!bags || bags<1){ errEl.style.display='block'; errEl.textContent='Enter at least 1 bag.'; return; }
    state.pickups.push({id:uid('p'), subscriberId, date, window:win, bags, instructions:notes, status:'scheduled', weightKg:null, createdAt:todayISO(0)});
    saveState(); render();
    showToast('Pickup booked for '+fmtDate(date)+', '+win.toLowerCase());
  },
  cancelPickup(id){ findPickup(id).status='cancelled'; saveState(); render(); showToast('Pickup cancelled'); },

  /* --- route board (admin) --- */
  startCollect(id){ state.ui.collectingPickupId=id; render(); },
  confirmCollected(id){
    const input = document.getElementById('wt-'+id);
    const val = parseFloat(input.value);
    if(!val || val<=0){ input.style.borderColor='var(--brick)'; showToast('Enter a valid weight in kg'); return; }
    const p = findPickup(id);
    p.weightKg = val; p.status='collected';
    const sub = findSub(p.subscriberId);
    if(sub){ sub.usedKg = Math.round((sub.usedKg + val)*10)/10; }
    state.ui.collectingPickupId=null;
    saveState(); render(); showToast('Marked collected');
  },
  advanceStatus(id){
    const p = findPickup(id);
    const next = PICKUP_STATUS[p.status].next;
    if(next){ p.status = next; saveState(); render(); showToast('Marked '+PICKUP_STATUS[next].label.toLowerCase()); }
  },
  askCancelPickup(id){ state.ui.confirmingCancelPickupId=id; render(); },
  cancelPickupAdmin(id){ findPickup(id).status='cancelled'; state.ui.confirmingCancelPickupId=null; saveState(); render(); showToast('Pickup cancelled'); },

  /* --- subscribers (admin) --- */
  toggleAddSubscriber(){ state.ui.addSubscriberOpen = !state.ui.addSubscriberOpen; render(); },
  addSubscriber(){
    const name = document.getElementById('add-name').value.trim();
    const phone = document.getElementById('add-phone').value.trim();
    const area = document.getElementById('add-area').value;
    const tier = document.getElementById('add-tier').value;
    const errEl = document.getElementById('add-error');
    if(!name || !phone){ errEl.style.display='block'; errEl.textContent='Name and phone are both required.'; return; }
    state.subscribers.push({id:uid('s'), name, phone, area, tier, status:'active', joinDate:todayISO(0), cycleStart:todayISO(0), usedKg:0});
    state.ui.addSubscriberOpen=false;
    saveState(); render(); showToast('Subscriber added');
  },
  filterSubscribers(val){
    state.ui.subscriberSearch = val;
    document.getElementById('subscriber-list').innerHTML = renderSubscriberRows(val.toLowerCase());
  },

  async resetDemo(){
    state = seedData();
    await saveState();
    render();
    showToast('Demo data reset');
  }
};

/* ================= INIT ================= */
(async function init(){
  await loadState();
  render();
})();
</script>
</body>
</html>
